<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa Denúncias</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css" />

</head>

<body>
    <a href="dashboard.html" id="btn-dashboard"
        style="display:none; position:absolute; top:16px; right:180px; z-index:1000; background:white; color:#e53e3e; border:1.5px solid #e53e3e; padding:10px 16px; border-radius:8px; font-size:14px; font-weight:500; text-decoration:none;">Dashboard</a>
    <div id="map"></div>
    <button id="btn-denunciar" onclick="abrirModal()">+ Nova denúncia</button>

    <div id="modal">
        <div id="modal-box">
            <h2>Nova denúncia</h2>
            <input id="input-titulo" type="text" placeholder="Título (ex: Buraco na calçada)" />
            <select id="input-categoria">
                <option value="buraco">Buraco</option>
                <option value="iluminacao">Iluminação</option>
                <option value="lixo">Lixo</option>
                <option value="alagamento">Alagamento</option>
                <option value="outro">Outro</option>
            </select>
            <textarea id="input-descricao" placeholder="Descreva o problema..."></textarea>
            <input id="input-foto" type="file" accept="image/*" />
            <p id="status-msg"></p>
            <button id="btn-enviar" onclick="enviarDenuncia()">Enviar</button>
            <button id="btn-cancelar" onclick="fecharModal()">Cancelar</button>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="app.js"></script>
</body>

</html>
